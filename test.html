<!DOCTYPE html>

    <title>Recruiter Network Marquee - Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .marquee-container {
            overflow: hidden;
            position: relative;
            width: 100%;
            background: black;
        }

        .marquee-content {
            display: flex;
            width: max-content;
            animation: scroll 40s linear infinite;
        }

        @keyframes scroll {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-50%);
            }
        }

        .marquee-container:hover .marquee-content {
            animation-play-state: paused;
        }

        .logo-item {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 2.5rem;
            height: 120px;
        }

        .logo-item img {
            max-height: 60px;
            max-width: 180px;
            width: auto;
            height: auto;
            object-fit: contain;
            filter: brightness(0) invert(1);
        }

        @media (min-width: 640px) {
            .logo-item {
                padding: 0 3rem;
            }
            .logo-item img {
                max-height: 70px;
                max-width: 200px;
            }
        }

        @media (min-width: 1024px) {
            .logo-item {
                padding: 0 4rem;
            }
            .logo-item img {
                max-height: 80px;
                max-width: 220px;
            }
        }
    </style>
</head>
